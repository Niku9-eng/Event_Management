{% extends "base.html" %}

{% block content %}

<div class="row">
{% for event in events %}

<div class="card m-3" style="width:18rem;">

<img src="/static/uploads/{{event.image}}" class="card-img-top">

<div class="card-body">

<h5 class="card-title">{{event.name}}</h5>

<p>
Date: {{event.date}} <br>
Location: {{event.location}}
</p>

<a href="/book/{{event.id}}" class="btn btn-primary">
Book Seat
</a>

</div>

</div>

{% endfor %}

</div>

{% endblock %}
